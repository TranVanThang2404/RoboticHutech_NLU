<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Follow Me — Đăng ký</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 32px 24px;
      max-width: 420px;
      width: 95vw;
      text-align: center;
    }

    h1 { font-size: 1.6rem; color: #00e5ff; letter-spacing: 1px; }
    .subtitle { color: #888; font-size: 0.9rem; }

    /* ---- Instruction steps ---- */
    .steps {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .step {
      background: rgba(0,229,255,0.07);
      border-left: 3px solid #00e5ff;
      padding: 9px 14px;
      border-radius: 5px;
      text-align: left;
      font-size: 0.88rem;
      color: #ccc;
    }
    .step strong { color: #00e5ff; }

    /* ---- Register button ---- */
    #btn-register {
      width: 100%;
      padding: 18px;
      font-size: 1.15rem;
      font-weight: bold;
      letter-spacing: 1px;
      background: #00c853;
      color: #000;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    #btn-register:active  { transform: scale(0.97); }
    #btn-register:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    /* ---- Emergency Stop button ---- */
    #btn-emergency {
      width: 100%;
      padding: 22px;
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: #d50000;
      color: #fff;
      border: 3px solid #ff1744;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(213,0,0,0.55);
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    #btn-emergency:active { transform: scale(0.96); }
    #btn-emergency.active {
      background: #b71c1c;
      animation: pulse-red 0.8s infinite;
    }

    /* ---- Resume button ---- */
    #btn-resume {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      background: #1a1a2e;
      color: #555;
      border: 2px solid #333;
      border-radius: 10px;
      cursor: not-allowed;
      transition: all 0.2s;
      display: none;
    }
    #btn-resume.visible {
      display: block;
      background: #0d3b1a;
      color: #00e676;
      border-color: #00e676;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0,230,118,0.3);
    }
    #btn-resume.visible:active { transform: scale(0.97); }

    @keyframes pulse-red {
      0%,100% { box-shadow: 0 0 20px rgba(213,0,0,0.55); }
      50%      { box-shadow: 0 0 38px rgba(255,23,68,0.9); }
    }

    /* ---- Status message ---- */
    #status {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: bold;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .s-idle     { background: #1a1a2e; color: #666;    border: 1px solid #333; }
    .s-waiting  { background: #1a1a2e; color: #ffab00; border: 1px solid #ffab00; }
    .s-success  { background: #0d3b1a; color: #00e676; border: 1px solid #00e676; }
    .s-error    { background: #3b0d0d; color: #ff5252; border: 1px solid #ff5252; }
    .s-following{ background: #0d2b1a; color: #69ff47; border: 1px solid #69ff47; }
    .s-emergency{ background: #3b0000; color: #ff1744; border: 2px solid #ff1744;
                  animation: pulse-red 0.8s infinite; }

    /* ---- Live state badge ---- */
    #live-state {
      font-size: 0.78rem;
      color: #555;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>&#x1F697; Follow Me</h1>
  <p class="subtitle">Ghép xong! Hãy đăng ký để xe nhận diện bạn</p>

  <div class="steps">
    <div class="step"><strong>1.</strong> Đứng trước camera xe (~1–2 m)</div>
    <div class="step"><strong>2.</strong> Nhấn nút <strong>ĐĂNG KÝ</strong> bên dưới</div>
    <div class="step"><strong>3.</strong> Xe sẽ follow đúng bạn dù xung quanh có nhiều người</div>
    <div class="step"><strong>4.</strong> Nhấn lại nếu muốn đăng ký lại</div>
  </div>

  <button id="btn-register" onclick="doRegister()">&#x1F4F8;&nbsp; ĐĂNG KÝ</button>

  <div id="status" class="s-idle">Chờ bạn nhấn đăng ký…</div>
  <div id="live-state">STATE: —</div>

  <!-- Phân cách -->
  <div style="width:100%;border-top:1px solid #2a2a2a;margin:4px 0"></div>

  <!-- Nút dừng khẩn cấp -->
  <button id="btn-emergency" onclick="doEmergency()">
    &#x26D4;&nbsp; DỪNG KHẨN CẤP
  </button>
  <button id="btn-resume" onclick="doResume()">
    &#x25B6;&nbsp; TIẾP TỤC
  </button>
</div>

<script>
  var statusEl   = document.getElementById('status');
  var btnEl      = document.getElementById('btn-register');
  var liveEl     = document.getElementById('live-state');
  var btnEmg     = document.getElementById('btn-emergency');
  var btnResume  = document.getElementById('btn-resume');
  var isEmergency = false;

  // ---- Emergency Stop ----
  function doEmergency() {
    fetch('/emergency_stop', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function() { applyEmergencyUI(true); })
      .catch(function() { setStatus('s-error', '&#x274C; Lỗi kết nối'); });
  }

  function doResume() {
    fetch('/resume', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function() { applyEmergencyUI(false); })
      .catch(function() { setStatus('s-error', '&#x274C; Lỗi kết nối'); });
  }

  function applyEmergencyUI(active) {
    isEmergency = active;
    if (active) {
      btnEmg.classList.add('active');
      btnResume.classList.add('visible');
      setStatus('s-emergency', '&#x26D4; Dừng khẩn cấp — nhấn TIẾP TỤC để mở');
      btnEl.disabled = true;
    } else {
      btnEmg.classList.remove('active');
      btnResume.classList.remove('visible');
      setStatus('s-idle', 'Xe đã mở khoá — sẵn sàng');
      btnEl.disabled = false;
    }
  }

  // ---- Register action ----
  function doRegister() {
    btnEl.disabled = true;
    setStatus('s-waiting', '&#x23F3; Đang chụp và nhận diện…');

    fetch('/capture_target', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          setStatus('s-success', '&#x2705; Đăng ký thành công! Xe sẽ follow bạn.');
          document.querySelector('.steps').style.display = 'none';
        } else {
          setStatus('s-error', '&#x274C; ' + (data.message || 'Thất bại, thử lại'));
        }
        btnEl.disabled = false;
        btnEl.textContent = '\uD83D\uDD04 Đăng ký lại';
      })
      .catch(function() {
        setStatus('s-error', '&#x274C; Lỗi kết nối, thử lại');
        btnEl.disabled = false;
      });
  }

  function setStatus(cls, html) {
    statusEl.className = cls;
    statusEl.innerHTML = html;
  }

  // ---- Live state polling ----
  function pollStatus() {
    fetch('/pair_status')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        liveEl.textContent = 'STATE: ' + d.state;

        // Đồng bộ trạng thái emergency từ server (xe có thể bị stop bởi phím E)
        if (d.emergency !== isEmergency) {
          applyEmergencyUI(d.emergency);
        }

        if (d.emergency) return;  // đang emergency → không ghi đè status

        if (d.state === 'FOLLOWING' && !btnEl.disabled) {
          setStatus('s-following', '&#x1F3C3; Đang follow bạn!');
        } else if (d.state === 'TARGET_LOST') {
          setStatus('s-error', '&#x26A0; Mất mục tiêu — đứng vào khung hình');
        } else if (d.state === 'OBSTACLE_STOP') {
          setStatus('s-waiting', '&#x1F6D1; Tạm dừng — vật cản phía trước');
        }
      })
      .catch(function() {});
  }
  setInterval(pollStatus, 2000);
  pollStatus();

  // ---- Wake lock ----
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(function() {});
  }
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && 'wakeLock' in navigator) {
      navigator.wakeLock.request('screen').catch(function() {});
    }
  });
</script>
</body>
</html>
