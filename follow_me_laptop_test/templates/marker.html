<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Follow Me — Đăng ký</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 24px 18px;
      max-width: 420px;
      width: 95vw;
      text-align: center;
    }

    h1 { font-size: 1.5rem; color: #00e5ff; }
    .subtitle { color: #888; font-size: 0.85rem; }

    /* Steps */
    .steps { width: 100%; }
    .step {
      background: rgba(0,229,255,0.06);
      border-left: 3px solid #00e5ff;
      padding: 7px 12px;
      margin-bottom: 4px;
      border-radius: 4px;
      text-align: left;
      font-size: 0.82rem;
      color: #bbb;
    }
    .step strong { color: #00e5ff; }
    .hidden { display: none !important; }

    /* ---- Capture carousel ---- */
    .capture-area {
      width: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .capture-area.active { display: flex; }

    .carousel {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .snap-slot {
      width: 80px;
      height: 110px;
      border-radius: 10px;
      border: 2px solid #333;
      background: #111;
      overflow: hidden;
      position: relative;
      transition: border-color 0.3s, transform 0.3s;
    }
    .snap-slot.filled {
      border-color: #00e5ff;
      animation: pop-in 0.35s ease-out;
    }
    .snap-slot.filled img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .snap-slot .slot-num {
      position: absolute;
      bottom: 2px; right: 4px;
      font-size: 0.6rem;
      color: #555;
      font-weight: bold;
    }
    .snap-slot.filled .slot-num { color: #00e5ff; }

    /* Spinner inside empty slots */
    .snap-slot:not(.filled)::before {
      content: '';
      width: 24px; height: 24px;
      border: 3px solid #222;
      border-top-color: #00e5ff;
      border-radius: 50%;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: spin 0.8s linear infinite;
      opacity: 0;
    }
    .snap-slot.waiting::before { opacity: 1; }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
    @keyframes pop-in {
      0%   { transform: scale(0.7); opacity: 0.5; }
      100% { transform: scale(1);   opacity: 1; }
    }

    /* Progress ring */
    .progress-ring {
      width: 60px; height: 60px;
    }
    .progress-ring circle {
      fill: none;
      stroke-width: 5;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
    .ring-bg { stroke: #222; }
    .ring-fg { stroke: #00e5ff; transition: stroke-dashoffset 0.4s ease; }

    .capture-text {
      font-size: 0.9rem;
      color: #aaa;
    }
    .capture-text strong { color: #00e5ff; }

    /* ---- Buttons ---- */
    .btn-main {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 1px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-main:active { transform: scale(0.97); }
    .btn-main:disabled { background: #333; color: #666; cursor: not-allowed; }

    #btn-register { background: #00c853; color: #000; }
    #btn-confirm  { background: #00e5ff; color: #000; display: none; }
    #btn-cancel   { background: #333; color: #aaa; border: 1px solid #555;
                    font-size: 0.85rem; padding: 10px; display: none; }

    /* Emergency */
    #btn-emergency {
      width: 100%;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: #d50000;
      color: #fff;
      border: 3px solid #ff1744;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(213,0,0,0.55);
      transition: background 0.15s, transform 0.1s;
    }
    #btn-emergency:active { transform: scale(0.96); }
    #btn-emergency.active { background: #b71c1c; animation: pulse-red 0.8s infinite; }
    #btn-resume {
      width: 100%;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: bold;
      background: #0d3b1a;
      color: #00e676;
      border: 2px solid #00e676;
      border-radius: 10px;
      cursor: pointer;
      display: none;
    }
    #btn-resume.visible { display: block; }
    @keyframes pulse-red {
      0%,100% { box-shadow: 0 0 16px rgba(213,0,0,0.55); }
      50%     { box-shadow: 0 0 32px rgba(255,23,68,0.9); }
    }

    /* Status */
    #status {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: bold;
      text-align: center;
    }
    .s-idle     { background: #1a1a2e; color: #666;    border: 1px solid #333; }
    .s-waiting  { background: #1a1a2e; color: #ffab00; border: 1px solid #ffab00; }
    .s-success  { background: #0d3b1a; color: #00e676; border: 1px solid #00e676; }
    .s-error    { background: #3b0d0d; color: #ff5252; border: 1px solid #ff5252; }
    .s-following{ background: #0d2b1a; color: #69ff47; border: 1px solid #69ff47; }
    .s-emergency{ background: #3b0000; color: #ff1744; border: 2px solid #ff1744;
                  animation: pulse-red 0.8s infinite; }

    #live-state { font-size: 0.72rem; color: #444; }
    .divider { width:100%; border-top:1px solid #222; margin:2px 0; }
  </style>
</head>
<body>
<div class="card">
  <h1>&#x1F697; Follow Me</h1>
  <p class="subtitle">Ghép xong! Đăng ký để xe nhận diện bạn</p>

  <!-- Bước hướng dẫn -->
  <div class="steps" id="steps-guide">
    <div class="step"><strong>1.</strong> Đứng trước camera xe (~1–2 m)</div>
    <div class="step"><strong>2.</strong> Nhấn <strong>ĐĂNG KÝ</strong> — camera chụp 6 tấm</div>
    <div class="step"><strong>3.</strong> Kiểm tra ảnh → nhấn <strong>XÁC NHẬN</strong></div>
    <div class="step"><strong>4.</strong> Xe bắt đầu follow bạn</div>
  </div>

  <!-- Nút đăng ký -->
  <button class="btn-main" id="btn-register" onclick="startCapture()">
    &#x1F4F8;&nbsp; ĐĂNG KÝ
  </button>

  <!-- Capture area (hiện khi đang chụp) -->
  <div class="capture-area" id="capture-area">
    <svg class="progress-ring" viewBox="0 0 60 60">
      <circle class="ring-bg" cx="30" cy="30" r="26" />
      <circle class="ring-fg" id="ring-fg" cx="30" cy="30" r="26"
              stroke-dasharray="163.36" stroke-dashoffset="163.36" />
    </svg>
    <div class="capture-text" id="capture-text">
      Đang chụp… <strong>0/6</strong>
    </div>

    <div class="carousel" id="carousel">
      <!-- 6 slots -->
      <div class="snap-slot waiting"><span class="slot-num">1</span></div>
      <div class="snap-slot"><span class="slot-num">2</span></div>
      <div class="snap-slot"><span class="slot-num">3</span></div>
      <div class="snap-slot"><span class="slot-num">4</span></div>
      <div class="snap-slot"><span class="slot-num">5</span></div>
      <div class="snap-slot"><span class="slot-num">6</span></div>
    </div>

    <button class="btn-main" id="btn-confirm" onclick="confirmTarget()">
      &#x2705;&nbsp; XÁC NHẬN — Bắt đầu follow
    </button>
    <button class="btn-main" id="btn-cancel" onclick="cancelCapture()">
      &#x274C;&nbsp; Hủy — chụp lại
    </button>
  </div>

  <div id="status" class="s-idle">Chờ bạn nhấn đăng ký…</div>
  <div id="live-state">STATE: —</div>

  <div class="divider"></div>

  <button id="btn-emergency" onclick="doEmergency()">&#x26D4;&nbsp; DỪNG KHẨN CẤP</button>
  <button id="btn-resume" onclick="doResume()">&#x25B6;&nbsp; TIẾP TỤC</button>
</div>

<script>
  var statusEl  = document.getElementById('status');
  var btnReg    = document.getElementById('btn-register');
  var btnConf   = document.getElementById('btn-confirm');
  var btnCancel = document.getElementById('btn-cancel');
  var captArea  = document.getElementById('capture-area');
  var stepsEl   = document.getElementById('steps-guide');
  var capText   = document.getElementById('capture-text');
  var ringFg    = document.getElementById('ring-fg');
  var liveEl    = document.getElementById('live-state');
  var btnEmg    = document.getElementById('btn-emergency');
  var btnResume = document.getElementById('btn-resume');
  var isEmergency = false;
  var pollTimer   = null;
  var RING_CIRC   = 163.36;  // 2*PI*26

  // ---- Start capture ----
  function startCapture() {
    btnReg.style.display = 'none';
    stepsEl.classList.add('hidden');
    captArea.classList.add('active');
    btnConf.style.display = 'none';
    btnCancel.style.display = 'none';
    setStatus('s-waiting', '&#x23F3; Đứng yên trước camera…');

    // Reset slots
    var slots = document.querySelectorAll('.snap-slot');
    slots.forEach(function(s, i) {
      s.className = 'snap-slot' + (i === 0 ? ' waiting' : '');
      var img = s.querySelector('img');
      if (img) img.remove();
    });
    updateRing(0);
    capText.innerHTML = 'Đang chụp… <strong>0/6</strong>';

    fetch('/start_capture', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.success) {
          pollTimer = setInterval(pollCapture, 600);
        } else {
          setStatus('s-error', '&#x274C; ' + d.message);
          resetUI();
        }
      })
      .catch(function() {
        setStatus('s-error', '&#x274C; Lỗi kết nối');
        resetUI();
      });
  }

  // ---- Poll capture progress ----
  function pollCapture() {
    fetch('/capture_progress')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var count = d.count;
        var slots = document.querySelectorAll('.snap-slot');

        // Fill completed slots
        for (var i = 0; i < count && i < d.snapshots.length; i++) {
          var slot = slots[i];
          if (!slot.classList.contains('filled')) {
            slot.className = 'snap-slot filled';
            var img = document.createElement('img');
            img.src = 'data:image/jpeg;base64,' + d.snapshots[i].jpeg_b64;
            slot.insertBefore(img, slot.firstChild);
          }
        }
        // Mark next slot as waiting
        if (count < 6) {
          slots[count].classList.add('waiting');
        }

        updateRing(count);
        capText.innerHTML = 'Đang chụp… <strong>' + count + '/6</strong>';

        if (d.done) {
          clearInterval(pollTimer);
          pollTimer = null;
          capText.innerHTML = '<strong>Chụp xong!</strong> Kiểm tra và xác nhận';
          btnConf.style.display = 'block';
          btnCancel.style.display = 'block';
          setStatus('s-success', '&#x2705; Chụp xong 6 tấm — nhấn XÁC NHẬN');
        }
      })
      .catch(function() {});
  }

  function updateRing(count) {
    var pct = count / 6;
    ringFg.style.strokeDashoffset = RING_CIRC * (1 - pct);
  }

  // ---- Confirm ----
  function confirmTarget() {
    btnConf.disabled = true;
    btnCancel.style.display = 'none';
    setStatus('s-waiting', '&#x23F3; Đang xác nhận…');

    fetch('/confirm_target', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.success) {
          setStatus('s-success', '&#x2705; Đăng ký thành công! Xe đang follow bạn.');
          captArea.classList.remove('active');
          btnReg.style.display = 'block';
          btnReg.textContent = '\uD83D\uDD04 Đăng ký lại';
        } else {
          setStatus('s-error', '&#x274C; ' + (d.message || 'Thất bại'));
          btnConf.disabled = false;
          btnCancel.style.display = 'block';
        }
      })
      .catch(function() {
        setStatus('s-error', '&#x274C; Lỗi kết nối');
        btnConf.disabled = false;
        btnCancel.style.display = 'block';
      });
  }

  // ---- Cancel ----
  function cancelCapture() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    fetch('/cancel_capture', { method: 'POST' }).catch(function() {});
    resetUI();
    setStatus('s-idle', 'Đã hủy — nhấn ĐĂNG KÝ để thử lại');
  }

  function resetUI() {
    captArea.classList.remove('active');
    stepsEl.classList.remove('hidden');
    btnReg.style.display = 'block';
    btnReg.disabled = false;
    btnConf.style.display = 'none';
    btnConf.disabled = false;
    btnCancel.style.display = 'none';
  }

  // ---- Emergency ----
  function doEmergency() {
    fetch('/emergency_stop', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function() { applyEmergencyUI(true); })
      .catch(function() { setStatus('s-error', '&#x274C; Lỗi kết nối'); });
  }
  function doResume() {
    fetch('/resume', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function() { applyEmergencyUI(false); })
      .catch(function() { setStatus('s-error', '&#x274C; Lỗi kết nối'); });
  }
  function applyEmergencyUI(active) {
    isEmergency = active;
    if (active) {
      btnEmg.classList.add('active');
      btnResume.classList.add('visible');
      setStatus('s-emergency', '&#x26D4; Dừng khẩn cấp');
    } else {
      btnEmg.classList.remove('active');
      btnResume.classList.remove('visible');
      setStatus('s-idle', 'Xe đã mở — sẵn sàng');
    }
  }

  function setStatus(cls, html) {
    statusEl.className = cls;
    statusEl.innerHTML = html;
  }

  // ---- Poll state ----
  function pollStatus() {
    fetch('/pair_status')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        liveEl.textContent = 'STATE: ' + d.state;
        if (d.emergency !== isEmergency) applyEmergencyUI(d.emergency);
        if (d.emergency) return;
        if (d.state === 'FOLLOWING')     setStatus('s-following', '&#x1F3C3; Đang follow bạn!');
        else if (d.state === 'TARGET_LOST')   setStatus('s-error', '&#x26A0; Mất mục tiêu');
        else if (d.state === 'OBSTACLE_STOP') setStatus('s-waiting', '&#x1F6D1; Vật cản — tạm dừng');
      }).catch(function() {});
  }
  setInterval(pollStatus, 2000);
  pollStatus();

  // Wake lock
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(function() {});
  }
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && 'wakeLock' in navigator)
      navigator.wakeLock.request('screen').catch(function() {});
  });
</script>
</body>
</html>
